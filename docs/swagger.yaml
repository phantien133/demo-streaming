basePath: /
definitions:
  auth.CreateTokenRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  auth.MeResponse:
    properties:
      email:
        type: string
      issuer:
        type: string
      role:
        type: string
      user_id:
        type: integer
    type: object
  auth.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  auth.RevokeResponse:
    properties:
      status:
        type: string
    type: object
  auth.RevokeTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  auth.TokenPairResponse:
    properties:
      access_token:
        type: string
      access_token_expires_in:
        type: integer
      refresh_token:
        type: string
      refresh_token_expires_in:
        type: integer
      token_type:
        type: string
    type: object
  streamkeys.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  streamkeys.IngestInfo:
    properties:
      provider:
        type: string
      rtmp_url:
        type: string
    type: object
  streamkeys.RevokeResponse:
    properties:
      status:
        type: string
    type: object
  streamkeys.StreamKeyResponse:
    properties:
      expires_in:
        type: integer
      ingest:
        $ref: '#/definitions/streamkeys.IngestInfo'
      stream_key:
        type: string
    type: object
  streampublishsessions.CreateIngestResponse:
    properties:
      provider:
        example: srs
        type: string
      rtmp_url:
        example: rtmp://localhost:1935/live
        type: string
      stream_key:
        type: string
    type: object
  streampublishsessions.CreateRequest:
    properties:
      title:
        type: string
    type: object
  streampublishsessions.CreateResponse:
    properties:
      ingest:
        $ref: '#/definitions/streampublishsessions.CreateIngestResponse'
      playback_url_cdn:
        type: string
      session_id:
        type: integer
      status:
        type: string
    type: object
  streampublishsessions.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  streampublishsessions.ListItemResponse:
    properties:
      created_at:
        type: integer
      ended_at:
        type: integer
      playback_id:
        type: string
      playback_url_cdn:
        type: string
      renditions:
        items:
          $ref: '#/definitions/streampublishsessions.ListRenditionResponse'
        type: array
      session_id:
        type: integer
      started_at:
        type: integer
      status:
        type: string
      title:
        type: string
    type: object
  streampublishsessions.ListRenditionResponse:
    properties:
      name:
        type: string
      playlist_path:
        type: string
      status:
        type: string
    type: object
  streampublishsessions.ListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/streampublishsessions.ListItemResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  streampublishsessions.StartResponse:
    properties:
      session_id:
        type: integer
      started_at:
        type: integer
      status:
        type: string
    type: object
  streampublishsessions.StopAllResponse:
    properties:
      ended_at:
        type: integer
      status:
        type: string
      stopped_session_ids:
        items:
          type: integer
        type: array
    type: object
  streampublishsessions.StopResponse:
    properties:
      ended_at:
        type: integer
      session_id:
        type: integer
      status:
        type: string
    type: object
info:
  contact: {}
  description: Go + Gin baseline for a learning-focused streaming system.
  title: demo-streaming API
  version: "1.0"
paths:
  /api/v1/auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.MeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user claims
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.TokenPairResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
      summary: Refresh token pair
      tags:
      - auth
  /api/v1/auth/revoke:
    post:
      consumes:
      - application/json
      parameters:
      - description: refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RevokeTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.RevokeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
      summary: Revoke refresh token
      tags:
      - auth
  /api/v1/auth/token:
    post:
      consumes:
      - application/json
      parameters:
      - description: login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.CreateTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.TokenPairResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
      summary: Login and create token pair
      tags:
      - auth
  /api/v1/stream-keys:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/streamkeys.StreamKeyResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/streamkeys.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/streamkeys.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create stream key
      tags:
      - stream-keys
  /api/v1/stream-keys/refresh:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/streamkeys.StreamKeyResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/streamkeys.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/streamkeys.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/streamkeys.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Refresh stream key
      tags:
      - stream-keys
  /api/v1/stream-keys/revoke:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/streamkeys.RevokeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/streamkeys.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/streamkeys.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Revoke stream key
      tags:
      - stream-keys
  /api/v1/stream-publish-sessions:
    get:
      parameters:
      - description: page number (default 1)
        in: query
        name: page
        type: integer
      - description: page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/streampublishsessions.ListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List stream publish sessions
      tags:
      - stream-publish-sessions
    post:
      consumes:
      - application/json
      parameters:
      - description: create publish session
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/streampublishsessions.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/streampublishsessions.CreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create stream publish session
      tags:
      - stream-publish-sessions
  /api/v1/stream-publish-sessions/{id}/start:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/streampublishsessions.StartResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Start stream publish session
      tags:
      - stream-publish-sessions
  /api/v1/stream-publish-sessions/{id}/stop:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/streampublishsessions.StopResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Stop stream publish session
      tags:
      - stream-publish-sessions
  /api/v1/stream-publish-sessions/stop-all:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/streampublishsessions.StopAllResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/streampublishsessions.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Stop all live stream publish sessions
      tags:
      - stream-publish-sessions
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
