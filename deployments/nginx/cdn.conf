worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  log_format cachelog '$remote_addr - $request '
                     'status=$status upstream=$upstream_status '
                     'cache=$upstream_cache_status rt=$request_time '
                     'urt=$upstream_response_time';
  access_log /var/log/nginx/access.log cachelog;

  # Local "CDN" cache store for demo.
  proxy_cache_path /var/cache/nginx/hls_cache
                   levels=1:2
                   keys_zone=hls_cache:50m
                   max_size=2g
                   inactive=10m
                   use_temp_path=off;

  upstream srs_origin {
    server srs:8080;
    keepalive 16;
  }
  # Playback proxy → compose service `api-dev`.
  upstream api_backend {
    server api-dev:8080;
    keepalive 16;
  }

  server {
    listen 8088 default_server;
    server_name _;

    # Does not proxy to api-dev/SRS — use to verify host:8088 is reachable (browser/TV/LAN).
    location = /cdn-healthz {
      default_type text/plain;
      return 200 "cdn-ok\n";
    }

    # Playback flow: OBS RTMP → SRS → FFmpeg transcode → multi-bitrate HLS on disk
    # → /live/<stream_id>/master.m3u8 (+ variant paths). See documents/PLAYBACK_FLOW.md.

    add_header X-Proxy "streaming-cdn" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    # Rewritten playlists point segments here (path-absolute /api/v1/playback/...).
    # Without this, /api/* fell through to SRS and segments 404'd — video never plays.
    location ^~ /api/ {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://api_backend;
    }

    # ABR master: serve from transcode volume when present; otherwise same playlist as flat /live/<id>.m3u8 (SRS via API).
    location ~ "^/live/([0-9a-f]+)/master\.m3u8$" {
      set $playback_id $1;
      root /var/transcode;
      try_files /$playback_id/master.m3u8 @cdn_master_fallback;
      add_header Cache-Control "public, max-age=2" always;
      add_header X-Served-By "transcode-pack" always;
    }

    # Named location + proxy_pass URI with variables is unreliable; rewrite then proxy without path.
    location @cdn_master_fallback {
      rewrite ^ /api/v1/playback/$playback_id/index.m3u8 break;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://api_backend;
    }

    # Variant playlists + segments: path must contain a slash (e.g. 720p/index.m3u8), never bare master.m3u8
    # — that URL is handled above so we never 404 here before try_files fallback can run.
    location ~ "^/live/([0-9a-f]+)/(.+/.+)$" {
      alias /var/transcode/$1/$2;
      add_header Cache-Control "public, max-age=2" always;
      add_header X-Served-By "transcode-pack" always;
    }

    # HLS playlist: short TTL for fresh timeline updates.
    # Flat /live/<playback_id>.m3u8 → API proxy (SRS origin, single-bitrate) until ABR exists under /live/<id>/.
    location ~* ^/live/([0-9a-f]+)\.m3u8$ {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;

      proxy_cache hls_cache;
      proxy_cache_key "$scheme$proxy_host$request_uri";
      proxy_cache_valid 200 2s;
      proxy_cache_lock on;
      proxy_cache_revalidate on;
      proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;

      add_header Cache-Control "public, max-age=2" always;
      add_header X-Cache-Status $upstream_cache_status always;

      proxy_pass http://api_backend/api/v1/playback/$1/index.m3u8;
    }

    location ~* \.m3u8$ {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;

      proxy_cache hls_cache;
      proxy_cache_key "$scheme$proxy_host$request_uri";
      proxy_cache_valid 200 2s;
      proxy_cache_lock on;
      proxy_cache_revalidate on;
      proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;

      add_header Cache-Control "public, max-age=2" always;
      add_header X-Cache-Status $upstream_cache_status always;

      proxy_pass http://srs_origin;
    }

    # HLS segments: longer TTL because segments are immutable.
    # Segments for public playback_id -> API proxy (maps back to stream_key_secret).
    location ~* ^/live/([0-9a-f]+)-(.+\.(ts|m4s|mp4|aac))$ {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;

      proxy_cache hls_cache;
      proxy_cache_key "$scheme$proxy_host$request_uri";
      proxy_cache_valid 200 30s;
      proxy_cache_lock on;
      proxy_cache_revalidate on;
      proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;

      add_header Cache-Control "public, max-age=30" always;
      add_header X-Cache-Status $upstream_cache_status always;

      proxy_pass http://api_backend/api/v1/playback/$1/segments/$1-$2;
    }

    location ~* \.(ts|m4s|mp4|aac)$ {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;

      proxy_cache hls_cache;
      proxy_cache_key "$scheme$proxy_host$request_uri";
      proxy_cache_valid 200 30s;
      proxy_cache_lock on;
      proxy_cache_revalidate on;
      proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;

      add_header Cache-Control "public, max-age=30" always;
      add_header X-Cache-Status $upstream_cache_status always;

      proxy_pass http://srs_origin;
    }

    # Default proxy to origin for non-cached paths (e.g., APIs/other assets).
    location / {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_pass http://srs_origin;
    }
  }
}
