listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
http_api {
  enabled on;
  listen 1985;
}

http_server {
  enabled on;
  listen 8080;
  dir ./objs/nginx/html;
}

vhost __defaultVhost__ {
  # HLS output for playback.
  hls {
    enabled on;
    hls_path ./objs/nginx/html;
    hls_fragment 2;
    # Keep segments long enough for client/CDN to fetch without 404.
    # With hls_fragment=2s, 60s window keeps ~30 segments.
    hls_window 60;

    # Disable HLS pseudo-streaming sessions for local CDN/proxy.
    # When enabled, SRS returns a master playlist that points to a session child playlist via ?hls_ctx=...
    # This breaks caching and can confuse players behind reverse proxies.
    hls_ctx off;
    hls_ts_ctx off;
  }

  # Call backend when a publisher starts streaming.
  # Note: `api` is the docker-compose service name.
  http_hooks {
    enabled on;
    on_publish http://api-dev:8080/api/v1/media/webhooks/srs/on-publish;
  }
}

